name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * 1' # Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutate:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore Stryker incremental file
        uses: actions/cache/restore@v5
        id: stryker-cache-restore
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.ref }}

      - name: Run mutation testing
        run: npm run test:mutate:incremental

      - name: Save Stryker incremental file
        uses: actions/cache/save@v5
        if: always()
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.ref }}-${{ github.run_id }}

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
